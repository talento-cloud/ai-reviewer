name: "Presubmit - AI Code Review & Fixes"
description: "AI-powered code reviews that detect issues, provide summaries, and suggest auto-fixes on PRs."
author: "Presubmit.ai"
branding:
  icon: "check-square"
  color: "black"
  tags: "ai,code-review,ai-assisted,automation,pull-requests,linting,ci,autofix,devtools"

runs:
  using: "node20"
  main: "dist/index.js"

inputs:
  llm_api_key:
    required: true
    description: 'API key for the LLM provider (e.g., Anthropic, OpenAI, Google). Not required when using SAP AI SDK.'
  llm_model:
    required: true
    description: 'LLM model to use (e.g., claude-sonnet-4-5, gpt-4o, gemini-2.5-pro). See docs for supported models.'
  llm_provider:
    required: false
    description: 'LLM provider to use: ai-sdk (default), sap-ai-sdk, or vertex-ai'
    default: 'ai-sdk'
  llm_base_url:
    required: false
    description: 'Base URL for OpenAI-compatible providers (e.g., https://openrouter.ai/api/v1). Only used with ai-sdk.'
    default: ''
  style_guide_rules:
    required: false
    description: 'Custom style guide rules that will be enforced during review by generating critical comments'
    default: ''
  github_api_url:
    required: false
    description: 'GitHub API URL for GitHub Enterprise Server (e.g., https://github.example.com/api/v3)'
    default: 'https://api.github.com'
  github_server_url:
    required: false
    description: 'GitHub Server URL for GitHub Enterprise Server (e.g., https://github.example.com)'
    default: 'https://github.com'
